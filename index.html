  <!-- Load shared utilities first, then router -->
  <!-- Load scripts with a version query to bust cache -->
  <script src="script.js?v=2"></script>
  <script src="router.js?v=2"></script>

  <!-- Particles.js for Fantastic Background Animation -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    if (typeof particlesJS !== "undefined") {
      particlesJS("particles-js", {
        "particles": {
          "number": { "value": 70, "density": { "enable": true, "value_area": 800 } },
          "color": { "value": "#22d3ee" },
          "shape": { "type": "circle" },
          "opacity": {
            "value": 0.5,
            "random": true,
            "anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false }
          },
          "size": {
            "value": 3,
            "random": true,
            "anim": { "enable": true, "speed": 2, "size_min": 0.1, "sync": false }
          },
          "line_linked": {
            "enable": true,
            "distance": 150,
            "color": "#06b6d4",
            "opacity": 0.35,
            "width": 1
          },
          "move": {
            "enable": true,
            "speed": 1.5,
            "direction": "none",
            "random": true,
            "straight": false,
            "out_mode": "out",
            "bounce": false
          }
        },
        "interactivity": {
          "detect_on": "window",
          "events": {
            "onhover": { "enable": true, "mode": "grab" },
            "onclick": { "enable": true, "mode": "push" },
            "resize": true
          },
          "modes": {
            "grab": { "distance": 180, "line_linked": { "opacity": 0.6 } },
            "push": { "particles_nb": 4 }
          }
        },
        "retina_detect": true
      });
    }
  </script>
